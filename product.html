<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — VitaShop</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
</head>
<body>

<div id="site-header"></div>

<section class="product-detail" id="productDetail"></section>

<section class="related-section" id="relatedSection" style="display:none">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">You may also <em>love</em></h2>
    </div>
    <div class="products-grid" id="relatedGrid"></div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  initLayout('shop');

  const productId = new URLSearchParams(window.location.search).get('id');
  const product = getProduct(productId);

  if (!product) {
    document.getElementById('productDetail').innerHTML = `
      <div class="container" style="padding:80px 0;text-align:center">
        <h2>Product not found</h2>
        <p>Sorry, we couldn't find that product. <a href="shop.html">Return to shop</a>.</p>
      </div>
    `;
  } else {
    document.title = product.name + ' — VitaShop';
    renderProduct(product);
    renderRelated(product);
  }

  function renderProduct(p) {
    const stars = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating));
    const savings = p.oldPrice ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
    const inStock = p.stock > 0;

    document.getElementById('productDetail').innerHTML = `
      <div class="container">
        <div class="breadcrumb">
          <a href="index.html">Home</a> <span>›</span>
          <a href="shop.html">Shop</a> <span>›</span>
          <a href="shop.html?cat=${p.category}">${p.categoryLabel}</a> <span>›</span>
          <span>${p.name}</span>
        </div>

        <div class="product-detail-grid">
          <!-- Gallery -->
          <div class="product-gallery">
            <div class="gallery-main">
              <img id="mainImage" src="${p.images[0]}" alt="${p.name}">
              ${p.tag ? `<span class="product-tag ${p.tag === 'SALE' ? 'tag-sale' : p.tag === 'NEW' ? 'tag-new' : ''}">${p.tag}</span>` : ''}
              ${savings > 0 ? `<span class="save-badge">Save ${savings}%</span>` : ''}
            </div>
            <div class="gallery-thumbs">
              ${p.images.map((img, i) => `
                <button class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="changeImage('${img}', this)">
                  <img src="${img}" alt="View ${i + 1}">
                </button>
              `).join('')}
            </div>
          </div>

          <!-- Info -->
          <div class="product-info-detail">
            <span class="product-cat-tag">${p.categoryLabel}</span>
            <h1 class="product-title">${p.name}</h1>

            <div class="product-rating-row">
              <span class="stars-large">${stars}</span>
              <span class="rating-meta">${p.rating} · ${p.reviews} reviews</span>
              <span class="rating-meta">·</span>
              <a href="#reviews" class="rating-link">Read reviews</a>
            </div>

            <p class="product-short">${p.short}</p>

            <div class="product-price-row">
              <span class="price-now">${fmt(p.price)}</span>
              ${p.oldPrice ? `<span class="price-old">${fmt(p.oldPrice)}</span>` : ''}
              ${savings > 0 ? `<span class="price-save-pill">Save ${savings}%</span>` : ''}
            </div>

            <div class="stock-status ${inStock ? 'in-stock' : 'out-stock'}">
              <span class="stock-dot"></span>
              ${inStock ? `In Stock — ${p.stock} available` : 'Out of Stock'}
            </div>

            <div class="size-selector">
              <label class="selector-label">Size</label>
              <div class="size-options">
                ${p.sizes.map((s, i) => `
                  <button class="size-btn ${i === 0 ? 'active' : ''}" onclick="document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); window.selectedSize = '${s}'">${s}</button>
                `).join('')}
              </div>
            </div>

            <div class="qty-add-row">
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <input type="number" id="qtyInput" value="1" min="1" max="${p.stock}">
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
              <button class="btn btn-primary btn-lg btn-add-cart" onclick="addToCart()" ${!inStock ? 'disabled' : ''}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h2l2.4 12.4a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L21 8H6"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
                Add to Cart
              </button>
            </div>

            <button class="btn btn-outline btn-block" onclick="buyNow()" ${!inStock ? 'disabled' : ''}>Buy Now</button>

            <!-- Info pills -->
            <div class="info-grid">
              <div class="info-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h18M5 7v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7M9 11h6"/></svg>
                <div>
                  <strong>Free Shipping</strong>
                  <span>On orders above RM 150</span>
                </div>
              </div>
              <div class="info-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <div>
                  <strong>Same-Day Dispatch</strong>
                  <span>Order before 2pm</span>
                </div>
              </div>
              <div class="info-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-12V5l-8-3-8 3v5c0 8 8 12 8 12z"/></svg>
                <div>
                  <strong>30-Day Returns</strong>
                  <span>Money-back guarantee</span>
                </div>
              </div>
              <div class="info-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
                <div>
                  <strong>Lab Tested</strong>
                  <span>Third-party verified</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="product-tabs">
          <div class="tab-headers">
            <button class="tab-btn active" data-tab="description">Description</button>
            <button class="tab-btn" data-tab="benefits">Benefits</button>
            <button class="tab-btn" data-tab="ingredients">Ingredients</button>
            <button class="tab-btn" data-tab="reviews">Reviews (${p.reviews})</button>
          </div>

          <div class="tab-body">
            <div class="tab-panel active" id="tab-description">
              <p>${p.description}</p>
              <p><strong>Serving:</strong> ${p.servingSize}</p>
            </div>
            <div class="tab-panel" id="tab-benefits">
              <ul class="benefits-list">
                ${p.benefits.map(b => `
                  <li>
                    <span class="benefit-check">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                    </span>
                    ${b}
                  </li>
                `).join('')}
              </ul>
            </div>
            <div class="tab-panel" id="tab-ingredients">
              <p>${p.ingredients}</p>
              <p style="margin-top:16px"><strong>Free from:</strong> Artificial colors, preservatives, GMOs, gluten, dairy.</p>
            </div>
            <div class="tab-panel" id="tab-reviews">
              <div class="reviews-summary">
                <div class="review-score">
                  <div class="review-big">${p.rating}</div>
                  <div class="stars-large">${stars}</div>
                  <div>Based on ${p.reviews} reviews</div>
                </div>
                <div class="review-bars">
                  ${[5,4,3,2,1].map(n => {
                    const pct = n === 5 ? 78 : n === 4 ? 16 : n === 3 ? 4 : n === 2 ? 1 : 1;
                    return `<div class="review-bar"><span>${n}★</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span>${pct}%</span></div>`;
                  }).join('')}
                </div>
              </div>

              <div class="review-list">
                ${getMockReviews(p).map(r => `
                  <div class="review-item">
                    <div class="review-head">
                      <div class="review-avatar">${r.name.split(' ').map(n => n[0]).join('')}</div>
                      <div>
                        <strong>${r.name}</strong>
                        <div class="review-meta">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)} · ${r.date}</div>
                      </div>
                    </div>
                    <p>${r.text}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    // Bind tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    window.selectedSize = p.sizes[0];
  }

  function getMockReviews(p) {
    return [
      { name: 'Aishah M.', stars: 5, date: '2 weeks ago', text: 'Genuinely impressed with the quality. Energy levels up, no weird aftertaste. Will repurchase.' },
      { name: 'Daniel T.', stars: 5, date: '1 month ago', text: 'Best product in this category I have tried. Worth every ringgit. Delivery was super fast too.' },
      { name: 'Priya S.', stars: 4, date: '1 month ago', text: 'Really good. Slightly pricey but the quality justifies it. Happy customer here.' }
    ];
  }

  window.changeImage = function(src, btn) {
    document.getElementById('mainImage').src = src;
    document.querySelectorAll('.gallery-thumb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };

  window.changeQty = function(delta) {
    const input = document.getElementById('qtyInput');
    const current = parseInt(input.value) || 1;
    const max = parseInt(input.max);
    input.value = Math.max(1, Math.min(max, current + delta));
  };

  window.addToCart = function() {
    const qty = parseInt(document.getElementById('qtyInput').value) || 1;
    Cart.add(product.id, qty, window.selectedSize);
    showToast(`Added ${qty} × ${product.name} to cart`);
  };

  window.buyNow = function() {
    const qty = parseInt(document.getElementById('qtyInput').value) || 1;
    Cart.add(product.id, qty, window.selectedSize);
    window.location.href = 'cart.html';
  };

  function renderRelated(p) {
    const related = getProducts().filter(x => x.category === p.category && x.id !== p.id).slice(0, 4);
    if (related.length === 0) return;
    document.getElementById('relatedSection').style.display = '';
    document.getElementById('relatedGrid').innerHTML = related.map(productCardHTML).join('');
  }
</script>

</body>
</html>
