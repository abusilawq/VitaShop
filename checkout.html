<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — VitaShop</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
</head>
<body>

<div id="site-header"></div>

<section class="page-hero compact">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> <a href="cart.html">Cart</a> <span>›</span> <span>Checkout</span></div>
    <h1 class="page-title"><em>Checkout</em></h1>
  </div>
</section>

<section class="checkout-section">
  <div class="container">
    <div id="checkoutContent"></div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  initLayout('');

  const cartItems = Cart.get();

  if (cartItems.length === 0) {
    document.getElementById('checkoutContent').innerHTML = `
      <div class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <h2>Your cart is empty</h2>
        <p>Add some products before checking out.</p>
        <a href="shop.html" class="btn btn-primary btn-lg">Browse Shop</a>
      </div>
    `;
  } else {
    renderCheckout();
  }

  function renderCheckout() {
    const user = Auth.current() || {};
    const subtotal = Cart.subtotal();
    const promo = Store.get('vs_promo');
    const discount = promo ? subtotal * promo.discount : 0;
    const shipping = subtotal >= 150 ? 0 : 12;
    const tax = (subtotal - discount) * 0.06;
    const total = subtotal - discount + shipping + tax;

    document.getElementById('checkoutContent').innerHTML = `
      <div class="checkout-grid">
        <div class="checkout-main">
          <!-- Contact -->
          <div class="checkout-block">
            <div class="block-num">1</div>
            <div class="block-body">
              <h3>Contact Information</h3>
              <div class="form-row">
                <div class="form-field">
                  <label>Email Address *</label>
                  <input type="email" id="email" value="${user.email || ''}" placeholder="you@email.com" required>
                </div>
                <div class="form-field">
                  <label>Phone Number *</label>
                  <input type="tel" id="phone" placeholder="+60 12-345 6789" required>
                </div>
              </div>
            </div>
          </div>

          <!-- Shipping -->
          <div class="checkout-block">
            <div class="block-num">2</div>
            <div class="block-body">
              <h3>Shipping Address</h3>
              <div class="form-row">
                <div class="form-field">
                  <label>First Name *</label>
                  <input type="text" id="firstName" value="${(user.name || '').split(' ')[0] || ''}" required>
                </div>
                <div class="form-field">
                  <label>Last Name *</label>
                  <input type="text" id="lastName" value="${(user.name || '').split(' ').slice(1).join(' ') || ''}" required>
                </div>
              </div>
              <div class="form-field">
                <label>Street Address *</label>
                <input type="text" id="address" placeholder="123, Jalan Example" required>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label>City *</label>
                  <input type="text" id="city" placeholder="Kuala Lumpur" required>
                </div>
                <div class="form-field">
                  <label>State *</label>
                  <select id="state" required>
                    <option value="">Select state</option>
                    <option>Selangor</option>
                    <option>Kuala Lumpur</option>
                    <option>Putrajaya</option>
                    <option>Penang</option>
                    <option>Johor</option>
                    <option>Perak</option>
                    <option>Pahang</option>
                    <option>Negeri Sembilan</option>
                    <option>Melaka</option>
                    <option>Kedah</option>
                    <option>Kelantan</option>
                    <option>Terengganu</option>
                    <option>Perlis</option>
                    <option>Sabah</option>
                    <option>Sarawak</option>
                  </select>
                </div>
                <div class="form-field">
                  <label>Postcode *</label>
                  <input type="text" id="postcode" placeholder="50480" maxlength="5" required>
                </div>
              </div>
              <div class="form-field-check">
                <label><input type="checkbox" id="saveAddress" checked> Save this address for next time</label>
              </div>
            </div>
          </div>

          <!-- Payment -->
          <div class="checkout-block">
            <div class="block-num">3</div>
            <div class="block-body">
              <h3>Payment Method</h3>
              <p class="block-desc">All transactions are secured with 256-bit SSL encryption.</p>

              <div class="payment-options">
                <label class="payment-option">
                  <input type="radio" name="payment" value="fpx" checked>
                  <span class="payment-card">
                    <span class="pay-logo pay-fpx">FPX</span>
                    <span class="pay-info">
                      <strong>Online Banking (FPX)</strong>
                      <small>Maybank, CIMB, Public Bank, RHB, Hong Leong, etc.</small>
                    </span>
                  </span>
                </label>

                <div class="bank-grid" id="bankGrid">
                  ${['Maybank2u', 'CIMB Clicks', 'Public Bank', 'RHB', 'Hong Leong', 'AmBank', 'Bank Islam', 'BSN'].map(b => `
                    <label class="bank-pick"><input type="radio" name="bank" value="${b}" ${b === 'Maybank2u' ? 'checked' : ''}> <span>${b}</span></label>
                  `).join('')}
                </div>

                <label class="payment-option">
                  <input type="radio" name="payment" value="grabpay">
                  <span class="payment-card">
                    <span class="pay-logo pay-grab">GrabPay</span>
                    <span class="pay-info">
                      <strong>GrabPay</strong>
                      <small>Pay using your Grab wallet</small>
                    </span>
                  </span>
                </label>

                <label class="payment-option">
                  <input type="radio" name="payment" value="tng">
                  <span class="payment-card">
                    <span class="pay-logo pay-tng">TNG</span>
                    <span class="pay-info">
                      <strong>Touch 'n Go eWallet</strong>
                      <small>Scan QR with your TNG app</small>
                    </span>
                  </span>
                </label>

                <label class="payment-option">
                  <input type="radio" name="payment" value="boost">
                  <span class="payment-card">
                    <span class="pay-logo pay-boost">Boost</span>
                    <span class="pay-info">
                      <strong>Boost eWallet</strong>
                      <small>Pay with Boost in seconds</small>
                    </span>
                  </span>
                </label>

                <label class="payment-option">
                  <input type="radio" name="payment" value="card">
                  <span class="payment-card">
                    <span class="pay-logo pay-card">CARD</span>
                    <span class="pay-info">
                      <strong>Credit / Debit Card</strong>
                      <small>Visa, Mastercard, AMEX</small>
                    </span>
                  </span>
                </label>

                <div class="card-fields" id="cardFields" style="display:none">
                  <div class="form-field">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456" maxlength="19">
                  </div>
                  <div class="form-row">
                    <div class="form-field">
                      <label>Expiry</label>
                      <input type="text" placeholder="MM/YY" maxlength="5">
                    </div>
                    <div class="form-field">
                      <label>CVV</label>
                      <input type="text" placeholder="123" maxlength="3">
                    </div>
                  </div>
                </div>
              </div>

              <div class="security-note">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span><strong>Demo Mode:</strong> No real payment will be processed. This is for demonstration only.</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Order Summary -->
        <aside class="checkout-summary">
          <h3>Order Summary</h3>

          <div class="summary-items">
            ${cartItems.map(item => {
              const p = getProduct(item.id);
              if (!p) return '';
              return `
                <div class="summary-item">
                  <div class="summary-img">
                    <img src="${p.image}" alt="${p.name}">
                    <span class="summary-qty">${item.qty}</span>
                  </div>
                  <div class="summary-item-info">
                    <h5>${p.name}</h5>
                    ${item.size ? `<small>${item.size}</small>` : ''}
                  </div>
                  <div class="summary-item-price">${fmt(p.price * item.qty)}</div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="summary-line"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
          ${discount > 0 ? `<div class="summary-line discount"><span>Discount (${promo.code})</span><span>-${fmt(discount)}</span></div>` : ''}
          <div class="summary-line"><span>Shipping</span><span>${shipping === 0 ? '<span class="free">FREE</span>' : fmt(shipping)}</span></div>
          <div class="summary-line"><span>SST (6%)</span><span>${fmt(tax)}</span></div>

          <div class="summary-total"><span>Total</span><span>${fmt(total)}</span></div>

          <button class="btn btn-primary btn-lg btn-block" id="placeOrderBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Place Order — ${fmt(total)}
          </button>

          <p class="legal-tiny">By placing this order, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
        </aside>
      </div>
    `;

    // Toggle bank grid
    document.querySelectorAll('input[name="payment"]').forEach(r => {
      r.addEventListener('change', e => {
        document.getElementById('bankGrid').style.display = e.target.value === 'fpx' ? '' : 'none';
        document.getElementById('cardFields').style.display = e.target.value === 'card' ? '' : 'none';
      });
    });

    document.getElementById('placeOrderBtn').addEventListener('click', placeOrder);
  }

  function placeOrder() {
    // Validate
    const required = ['email', 'phone', 'firstName', 'lastName', 'address', 'city', 'state', 'postcode'];
    for (const f of required) {
      const el = document.getElementById(f);
      if (!el || !el.value.trim()) {
        showToast('Please fill in all required fields');
        if (el) el.focus();
        return;
      }
    }

    const payment = document.querySelector('input[name="payment"]:checked').value;
    const paymentLabel = {
      fpx: 'FPX - ' + (document.querySelector('input[name="bank"]:checked')?.value || 'Maybank'),
      grabpay: 'GrabPay',
      tng: "Touch 'n Go eWallet",
      boost: 'Boost eWallet',
      card: 'Credit Card'
    }[payment];

    // Build order
    const subtotal = Cart.subtotal();
    const promo = Store.get('vs_promo');
    const discount = promo ? subtotal * promo.discount : 0;
    const shipping = subtotal >= 150 ? 0 : 12;
    const tax = (subtotal - discount) * 0.06;
    const total = subtotal - discount + shipping + tax;

    const orderId = 'VS-' + new Date().toISOString().slice(0,10).replace(/-/g, '') + '-' + String(Math.floor(Math.random() * 999)).padStart(3, '0');

    const order = {
      id: orderId,
      date: new Date().toISOString().split('T')[0],
      customer: document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      items: Cart.get().map(item => {
        const p = getProduct(item.id);
        return { name: p.name, qty: item.qty, price: p.price, size: item.size };
      }),
      subtotal, discount, shipping, tax, total,
      status: 'processing',
      payment: paymentLabel,
      address: `${document.getElementById('address').value}, ${document.getElementById('city').value} ${document.getElementById('postcode').value}, ${document.getElementById('state').value}`
    };

    // Save to orders
    const orders = Store.get('vs_orders', []);
    orders.unshift(order);
    Store.set('vs_orders', orders);

    // Save to user's orders
    Store.set('vs_lastOrder', order);

    // Clear cart & promo
    Cart.clear();
    Store.remove('vs_promo');

    // Show processing
    const btn = document.getElementById('placeOrderBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Processing payment...';

    setTimeout(() => {
      window.location.href = 'order-success.html?id=' + orderId;
    }, 1800);
  }
</script>

</body>
</html>
