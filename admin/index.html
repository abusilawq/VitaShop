<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In — VitaShop</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
</head>
<body class="admin-login-body">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <a href="../index.html" class="admin-login-logo">
      <span class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-1 4-4 6-8 6 0 6 4 12 8 14 4-2 8-8 8-14-4 0-7-2-8-6z"/></svg>
      </span>
      VitaShop
    </a>
    <span class="admin-badge">ADMIN PORTAL</span>
    <h1>Welcome <em>back</em>.</h1>
    <p class="admin-login-sub">Sign in to your admin dashboard</p>

    <div class="demo-creds-admin">
      <strong>Demo Admin Credentials</strong>
      <div class="cred-card-admin" onclick="fillDemo()">
        <code>admin@vitashop.my</code>
        <code>admin123</code>
        <span class="cred-tap">Tap to fill</span>
      </div>
    </div>

    <form class="auth-form" id="adminLoginForm">
      <div class="form-field">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In to Admin</button>

      <p class="admin-back-link">
        <a href="../index.html">← Back to VitaShop</a>
      </p>
    </form>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  function fillDemo() {
    document.getElementById('email').value = 'admin@vitashop.my';
    document.getElementById('password').value = 'admin123';
  }

  document.getElementById('adminLoginForm').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const result = Auth.login(email, password);

    if (!result.ok || !result.admin) {
      showToast('Invalid admin credentials');
      return;
    }

    showToast('Welcome, Admin');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
  });
</script>

</body>
</html>
